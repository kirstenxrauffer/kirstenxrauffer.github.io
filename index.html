  <body>
    <script>
      // Companion to /404.html (GitHub Pages SPA redirect). Decodes the
      // encoded path from the query string and restores it via History
      // API before React boots, so BrowserRouter sees the real URL.
      (function (l) {
        if (l.search[1] === '/') {
          var decoded = l.search.slice(1).split('&').map(function (s) {
            return s.replace(/~and~/g, '&');
          }).join('?');
          window.history.replaceState(null, null,
            l.pathname.slice(0, -1) + decoded + l.hash
          );
        }
      })(window.location);
    </script>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
